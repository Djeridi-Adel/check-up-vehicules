<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a73e8">
  <title>Check-up véhicule</title>
  <link rel="stylesheet" href="src/css/main.css">
</head>
<body>

<header>
  <div class="header-content">
    <button id="btn-retour" class="btn-retour hidden">← Retour</button>
    <h1 id="header-title">Check-up véhicule</h1>
    <a href="src/pages/admin.html" class="lien-admin-header">Admin</a>
  </div>
  <div id="progress-bar-container" class="progress-bar-container hidden">
    <div id="progress-bar" class="progress-bar"></div>
    <span id="progress-label" class="progress-label"></span>
  </div>
</header>

  <main id="app">

    <!-- Étape 0 : identification -->
<section id="step-identification" class="step active">
  <div class="identification">
    <div class="identification-icon">👤</div>
    <h2>Identification</h2>
    <p>Renseigne ton adresse mail pour commencer</p>
    <div class="form-group">
      <input 
        type="email" 
        id="input-mail" 
        placeholder="prenom.nom@mairie.fr"
        autocomplete="email"
      >
      <p id="mail-error" class="mail-error"></p>
    </div>
    <button id="btn-identifier" class="btn-primary">Continuer →</button>
  </div>
</section>

    <!-- Étape 1 : sélection du véhicule -->
    <section id="step-vehicule" class="step active">
      <h2>Sélectionne ton véhicule</h2>
      <div id="liste-vehicules" class="liste-vehicules">
        <p class="loading">Chargement des véhicules...</p>
      </div>
    </section>

    <!-- Étape 2 : section du formulaire (générée dynamiquement) -->
    <section id="step-section" class="step">
      <form id="form-section">
        <!-- Contenu généré dynamiquement -->
      </form>
      <div class="nav-buttons">
        <button id="btn-precedent" class="btn-secondary-action">← Précédent</button>
        <button id="btn-suivant" class="btn-primary">Suivant →</button>
      </div>
    </section>

    <!-- Étape 3 : confirmation -->
    <section id="step-confirmation" class="step">
      <div class="confirmation">
        <span class="confirmation-icon">✓</span>
        <h2>Check-up envoyé !</h2>
        <p id="recap-vehicule"></p>
        <p id="recap-heure"></p>
        <button id="btn-nouveau" class="btn-primary">Nouveau check-up</button>
      </div>
    </section>

  </main>

  <script type="module" src="src/js/firebase.js"></script>
  <script type="module" src="src/js/checkup.js"></script>

</body>
</html>
