<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a73e8">
  <title>Parc véhicules</title>
  <link rel="stylesheet" href="src/css/main.css">
</head>
<body>

  <header>
    <div class="header-content">
      <h1 id="header-title">Parc véhicules</h1>
      <a href="src/pages/admin.html" class="lien-admin-header">Admin</a>
    </div>
  </header>

  <main id="app">

    <!-- Écran d'identification -->
    <section id="step-identification" class="step active">
      <div class="identification">
        <div class="identification-icon">👤</div>
        <h2>Identification</h2>
        <p>Renseigne ton adresse mail pour commencer</p>
        <div class="form-group">
          <input
            type="email"
            id="input-mail"
            placeholder="prenom.nom@mairie.fr"
            autocomplete="email"
          >
          <p id="mail-error" class="mail-error"></p>
        </div>
        <button id="btn-identifier" class="btn-primary">Continuer →</button>
      </div>
    </section>

    <!-- Écran d'accueil -->
    <section id="step-accueil" class="step">
      <div class="accueil">
        <p class="accueil-mail" id="accueil-mail"></p>
        <h2>Que voulez-vous faire ?</h2>
        <div class="accueil-boutons">
          <button id="btn-checkup" class="accueil-btn accueil-btn-primary">
            <span class="accueil-btn-icon">🔍</span>
            <span class="accueil-btn-label">Check-up du matin</span>
            <span class="accueil-btn-desc">Vérification avant départ</span>
          </button>
          <a href="src/pages/signalement.html" id="btn-signalement" class="accueil-btn accueil-btn-danger">
            <span class="accueil-btn-icon">⚠️</span>
            <span class="accueil-btn-label">Signaler un incident</span>
            <span class="accueil-btn-desc">Panne ou accident en service</span>
          </a>
        </div>
      </div>
    </section>

    <!-- Sélection véhicule -->
    <section id="step-vehicule" class="step">
      <h2>Sélectionne ton véhicule</h2>
      <div id="liste-vehicules" class="liste-vehicules">
        <p class="loading">Chargement des véhicules...</p>
      </div>
    </section>

    <!-- Section formulaire -->
    <section id="step-section" class="step">
      <form id="form-section"></form>
      <div class="nav-buttons">
        <button id="btn-precedent" class="btn-secondary-action">← Précédent</button>
        <button id="btn-suivant" class="btn-primary">Suivant →</button>
      </div>
    </section>

    <!-- Consignes de sécurité -->
    <section id="step-consignes" class="step">
      <div class="consignes">
        <h2>Rappel des consignes</h2>
        <img
          src="src/assets/consignes.png"
          alt="Consignes de sécurité"
          class="consignes-img"
        >
        <div class="nav-buttons">
          <button id="btn-consignes-retour" class="btn-secondary-action">← Précédent</button>
          <button id="btn-consignes-valider" class="btn-primary">J'ai lu et compris ✓</button>
        </div>
      </div>
    </section>

    <!-- Confirmation -->
    <section id="step-confirmation" class="step">
      <div class="confirmation">
        <span class="confirmation-icon">✓</span>
        <h2>Check-up envoyé !</h2>
        <p id="recap-vehicule"></p>
        <p id="recap-heure"></p>
        <button id="btn-nouveau" class="btn-primary">Retour à l'accueil</button>
      </div>
    </section>

  </main>

  <script type="module" src="src/js/firebase.js"></script>
  <script type="module" src="src/js/checkup.js"></script>

</body>
</html>
